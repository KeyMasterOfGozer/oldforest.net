<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Stats — Old Forest</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1a0b;
      --surface: #162414;
      --border:  #2a3e20;
      --text:    #e8d8b0;
      --muted:   #859e6a;
      --accent:  #78a84e;
      --radius:  8px;
    }

    body { background: var(--bg); color: var(--text);
           font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* ── Header ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 100; }
    .header-inner { display: flex; align-items: center; height: 56px; }
    .site-title { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -.3px; font-family: Georgia, serif; white-space: nowrap; text-decoration: none; margin-right: 20px; }
    .header-nav { display: flex; align-items: center; gap: 14px; flex: 1; }
    .header-auth { display: flex; align-items: center; gap: 10px; font-family: -apple-system, sans-serif; white-space: nowrap; }
    #user-email, #user-name { color: var(--muted); font-size: 13px; }
    .nav-link { font-family: -apple-system, sans-serif; font-size: 13px; color: var(--muted); text-decoration: none; transition: color .15s; }
    .nav-link:hover { color: var(--accent); }
    .rss-link { display: inline-flex; align-items: center; gap: 5px; font-family: -apple-system, sans-serif; font-size: 12px; font-weight: 600; color: #fff; background: #f26522; border-radius: 4px; padding: 3px 7px; text-decoration: none; transition: opacity .15s; white-space: nowrap; }
    .rss-link:hover { opacity: .85; color: #fff; text-decoration: none; }

    /* ── Main ── */
    main { max-width: 960px; margin: 0 auto; padding: 28px 24px 60px; }
    h1 { font-size: 26px; color: var(--accent); margin-bottom: 6px; font-family: Georgia, serif; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 28px; }

    /* ── Buttons ── */
    .btn {
      display: inline-block; cursor: pointer; border: none; border-radius: var(--radius);
      font-size: 13px; font-weight: 600; padding: 8px 18px; transition: opacity .15s;
      background: var(--accent); color: #0d1a0b; text-decoration: none;
    }
    .btn:hover { opacity: .85; }
    .btn:disabled { opacity: .4; cursor: not-allowed; }

    /* ── States ── */
    #loading { padding: 60px; text-align: center; color: var(--muted); }
    #error   { padding: 40px; text-align: center; color: #c05848; }

    /* ── Section layout ── */
    .sections { display: grid; grid-template-columns: 300px 1fr; gap: 32px; align-items: start; }
    @media (max-width: 720px) { .sections { grid-template-columns: 1fr; } }

    .section-title {
      font-size: 16px; font-weight: 600; color: var(--accent); margin-bottom: 14px;
      padding-bottom: 8px; border-bottom: 1px solid var(--border);
    }

    /* ── Tables ── */
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th {
      text-align: left; font-size: 12px; font-weight: 600; color: var(--muted);
      text-transform: uppercase; letter-spacing: .4px;
      padding: 8px 12px; border-bottom: 1px solid var(--border);
    }
    td { padding: 8px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    tr:last-child td { border-bottom: none; }
    tr:hover td { background: var(--surface); }

    .num { text-align: right; color: var(--muted); font-variant-numeric: tabular-nums; }
    .yr  { font-weight: 600; }

    /* Readings table */
    #readings-section { overflow: auto; max-height: 70vh; }
    #readings-section table { min-width: 580px; }
    .book-title  { font-weight: 500; max-width: 220px; }
    .book-author { color: var(--muted); font-size: 13px; }

    /* ── Toolbar ── */
    .toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; flex-wrap: wrap; }
    .toolbar input[type="search"] {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 13px; padding: 6px 12px; outline: none; width: 220px;
    }
    .toolbar input[type="search"]:focus { border-color: var(--accent); }
    .toolbar input[type="search"]::placeholder { color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="site-title" href="/">🌳 Old Forest</a>
    <nav class="header-nav">
      <a href="/v1/feed.xml" class="rss-link" title="RSS Feed"><svg width="11" height="11" viewBox="0 0 8 8" fill="currentColor" aria-hidden="true"><circle cx="1" cy="7" r="1"/><path d="M0 4q4 0 4 4h1.5Q5.5 2.5 0 2.5z"/><path d="M0 1Q7 1 7 8h1.5Q8.5-.5 0-.5z"/></svg> RSS</a>
      <a href="/" class="nav-link">Blog</a>
      <a href="/apps.html" class="nav-link">Apps</a>
    </nav>
  </div>
</header>

<main>
  <h1>📊 Book Stats &amp; CSV</h1>
  <p class="subtitle">Reading history — yearly stats and downloadable CSV.</p>

  <div id="loading">Loading reading history…</div>
  <div id="error"   style="display:none"></div>
  <div id="content" style="display:none">
    <div class="sections">
      <!-- Yearly stats (left column) -->
      <div>
        <div class="section-title">Yearly Stats</div>
        <table id="stats-table">
          <thead>
            <tr>
              <th>Year</th>
              <th class="num">Books</th>
              <th class="num">Avg days</th>
              <th class="num">Total pages</th>
              <th class="num">Avg pages</th>
            </tr>
          </thead>
          <tbody id="stats-tbody"></tbody>
        </table>
      </div>

      <!-- All readings (right column) -->
      <div>
        <div class="toolbar">
          <div class="section-title" style="margin:0;flex:1">All Reading Dates</div>
          <input type="search" id="search" placeholder="Search title or author…">
          <button class="btn" id="btn-download">⬇ Download CSV</button>
        </div>
        <div id="readings-section">
          <table>
            <thead>
              <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Started</th>
                <th>Finished</th>
                <th class="num">Days</th>
              </tr>
            </thead>
            <tbody id="readings-tbody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</main>

<script>
'use strict';

const API_BASE = 'https://aijo86kijl.execute-api.us-east-1.amazonaws.com';
const API      = '/v1/reading/reads';

let allReadings = [];
let csvData     = '';

function parseDate(str) {
  // str is ISO date string like "2025-03-15" or null/undefined
  if (!str) return null;
  const d = new Date(str + 'T12:00:00Z'); // noon UTC to avoid timezone shifting
  return isNaN(d) ? null : d;
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function csvCell(v) {
  const s = String(v ?? '');
  return (s.includes(',') || s.includes('"') || s.includes('\n'))
    ? `"${s.replace(/"/g, '""')}"` : s;
}

function processReads(reads) {
  const readings = [];
  for (const read of reads) {
    const book   = read.book ?? {};
    const start  = parseDate(read.started);
    const finish = parseDate(read.finished);
    const end    = finish ?? new Date();
    const days   = start ? Math.round((end - start) / 86_400_000) : null;
    readings.push({
      title:     book.title  ?? '',
      author:    book.author ?? '',
      startStr:  read.started  ?? '',
      finishStr: read.finished ?? '',
      start,
      finish,
      days,
      pages:     book.pageCount ?? null,
      year:      (finish ?? end).getFullYear(),
    });
  }
  // Already sorted by API, but ensure finish-date order
  readings.sort((a, b) => {
    const af = a.finishStr || a.startStr || '';
    const bf = b.finishStr || b.startStr || '';
    return af.localeCompare(bf);
  });
  return readings;
}

function buildStats(readings) {
  const map = {};
  for (const r of readings) {
    if (!map[r.year]) map[r.year] = { count: 0, totalDays: 0, totalPages: 0, pagesCount: 0 };
    map[r.year].count++;
    map[r.year].totalDays += r.days ?? 0;
    if (r.pages) { map[r.year].totalPages += r.pages; map[r.year].pagesCount++; }
  }
  return Object.entries(map)
    .map(([yr, s]) => ({
      year:     +yr,
      count:    s.count,
      avg:      (s.totalDays / s.count).toFixed(1),
      totPages: s.totalPages || null,
      avgPages: s.pagesCount ? Math.round(s.totalPages / s.pagesCount) : null,
    }))
    .sort((a, b) => a.year - b.year);
}

function buildCsv(readings) {
  const rows = [['Author','Title','Start','Finish','Duration (days)']];
  for (const r of readings) {
    rows.push([r.author, r.title, r.startStr, r.finishStr, r.days ?? '']);
  }
  return rows.map(row => row.map(csvCell).join(',')).join('\n');
}

function renderReadings(readings) {
  const tbody = document.getElementById('readings-tbody');
  if (!readings.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="color:var(--muted);text-align:center;padding:24px">No results</td></tr>';
    return;
  }
  tbody.innerHTML = readings.map(r => `
    <tr>
      <td class="book-title">${esc(r.title)}</td>
      <td class="book-author">${esc(r.author)}</td>
      <td>${esc(r.startStr)  || '—'}</td>
      <td>${esc(r.finishStr) || '<i>reading</i>'}</td>
      <td class="num">${r.days ?? '—'}</td>
    </tr>`).join('');
}

function renderStats(stats) {
  const tbody = document.getElementById('stats-tbody');
  tbody.innerHTML = stats.map(s => `
    <tr>
      <td class="yr">${s.year}</td>
      <td class="num">${s.count}</td>
      <td class="num">${s.avg}</td>
      <td class="num">${s.totPages?.toLocaleString() ?? '—'}</td>
      <td class="num">${s.avgPages?.toLocaleString() ?? '—'}</td>
    </tr>`).join('');
}

function downloadCsv() {
  const a = document.createElement('a');
  a.href = 'data:text/csv;charset=utf-8,' + encodeURIComponent(csvData);
  a.download = 'ReadingDates.csv';
  a.style.display = 'none';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
}

async function init() {
  try {
    const res = await fetch(`${API_BASE}${API}`);
    if (!res.ok) throw new Error(`API error ${res.status}`);
    const data = await res.json();
    if (!data.reads) throw new Error('No reading data returned');

    allReadings = processReads(data.reads);
    csvData     = buildCsv(allReadings);
    const stats = buildStats(allReadings);

    renderStats(stats);
    renderReadings(allReadings);

    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';

    document.getElementById('btn-download').addEventListener('click', downloadCsv);

    document.getElementById('search').addEventListener('input', e => {
      const q = e.target.value.toLowerCase();
      const filtered = q
        ? allReadings.filter(r =>
            r.title.toLowerCase().includes(q) || r.author.toLowerCase().includes(q))
        : allReadings;
      renderReadings(filtered);
    });

  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = `Failed to load books: ${e.message}`;
    console.error(e);
  }
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Book Timeline — Old Forest</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">

  <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/vis-timeline/7.7.3/vis-timeline-graph2d.min.css">
  <script
    src="https://cdnjs.cloudflare.com/ajax/libs/vis-timeline/7.7.3/vis-timeline-graph2d.min.js">
  </script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1a0b;
      --surface: #162414;
      --border:  #2a3e20;
      --text:    #e8d8b0;
      --muted:   #859e6a;
      --accent:  #78a84e;
      --radius:  8px;
    }

    body { background: var(--bg); color: var(--text);
           font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

    /* ── Header ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center;
                    justify-content: space-between; height: 56px; }
    .site-title { font-size: 18px; font-weight: 700; color: var(--accent);
                  text-decoration: none; font-family: Georgia, serif; }
    .header-links { display: flex; gap: 16px; font-size: 13px; }
    .header-links a { color: var(--muted); text-decoration: none; }
    .header-links a:hover { color: var(--accent); }

    /* ── Main ── */
    main { max-width: 1200px; margin: 0 auto; padding: 28px 24px 40px; }

    h1 { font-size: 26px; color: var(--accent); margin-bottom: 6px; font-family: Georgia, serif; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 24px; }

    /* ── Controls ── */
    .controls { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center; }
    .controls label { font-size: 13px; color: var(--muted); }
    .controls select, .controls input[type="checkbox"] { accent-color: var(--accent); }
    select {
      background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
      color: var(--text); font-size: 13px; padding: 5px 10px; outline: none;
    }
    select:focus { border-color: var(--accent); }

    /* ── Timeline container ── */
    #timeline-wrap {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      min-height: 300px;
    }
    #loading { padding: 80px; text-align: center; color: var(--muted); font-size: 15px; }
    #error   { padding: 60px; text-align: center; color: #c05848; font-size: 15px; }

    /* ── Overview / scrubber (canvas) ── */
    #overview-section { display: none; margin-top: 6px; }
    .overview-label {
      font-size: 11px; color: var(--muted); text-transform: uppercase;
      letter-spacing: .06em; margin-bottom: 4px;
      font-family: -apple-system, sans-serif;
    }
    #overview-canvas {
      display: block;
      width: 100%;
      height: 64px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: crosshair;
      user-select: none;
    }

    /* ── Legend ── */
    .legend { display: flex; gap: 20px; margin-top: 16px; flex-wrap: wrap; font-size: 13px; }
    .legend-item { display: flex; align-items: center; gap: 7px; }
    .legend-dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
    .dot-owned    { background: #5588cc; }
    .dot-kindle   { background: #999; }
    .dot-borrowed { background: #44aa66; }
    .dot-current  { background: #cc4444; }

    /* ── vis-timeline dark theme overrides ── */
    .vis-timeline { background: var(--surface) !important; border: none !important; }
    .vis-panel.vis-center, .vis-panel.vis-left, .vis-panel.vis-right,
    .vis-panel.vis-top, .vis-panel.vis-bottom { border-color: var(--border) !important; }
    .vis-time-axis .vis-text { color: var(--muted) !important; }
    .vis-time-axis .vis-grid.vis-minor { border-color: #1e3018 !important; }
    .vis-time-axis .vis-grid.vis-major { border-color: #2a3e20 !important; }
    .vis-current-time { background: var(--accent) !important; }

    /* Book item styles */
    .vis-item { border-radius: 4px !important; border-width: 1px !important; font-size: 12px !important; }
    .vis-item.owned    { background: #1a3460 !important; border-color: #5588cc !important; color: #aaccff !important; }
    .vis-item.kindle   { background: #2a2a2a !important; border-color: #999 !important;    color: #ccc !important; }
    .vis-item.borrowed { background: #1a3828 !important; border-color: #44aa66 !important; color: #88ddaa !important; }
    .vis-item.current  { background: #3a1818 !important; border-color: #cc4444 !important; color: #ffaaaa !important; }

    .vis-item.vis-selected.owned    { background: #2a4a80 !important; }
    .vis-item.vis-selected.kindle   { background: #3a3a3a !important; }
    .vis-item.vis-selected.borrowed { background: #1e4830 !important; }
    .vis-item.vis-selected.current  { background: #4a2020 !important; }

    /* Tooltip */
    .vis-tooltip {
      background: var(--surface) !important;
      border: 1px solid var(--border) !important;
      color: var(--text) !important;
      padding: 10px 14px !important;
      border-radius: var(--radius) !important;
      font-size: 13px !important;
      max-width: 280px !important;
      line-height: 1.6 !important;
    }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="site-title" href="/">🌳 Old Forest</a>
    <div class="header-links">
      <a href="/">Blog</a>
      <a href="/apps.html">← Apps</a>
    </div>
  </div>
</header>

<main>
  <h1>📚 Book Timeline</h1>
  <p class="subtitle">Books read over the years. Drag to scroll, scroll to zoom.</p>

  <div class="controls">
    <label>
      Show:&nbsp;
      <select id="filter-tag">
        <option value="all">All books</option>
        <option value="owned">Owned (blue)</option>
        <option value="kindle">Kindle (grey)</option>
        <option value="borrowed">Borrowed (green)</option>
        <option value="current">Currently reading (red)</option>
      </select>
    </label>
  </div>

  <div id="timeline-wrap">
    <div id="loading">Loading reading history…</div>
    <div id="timeline" style="display:none"></div>
  </div>
  <div id="overview-section">
    <div class="overview-label">All time — click or drag to navigate</div>
    <canvas id="overview-canvas" height="64"></canvas>
  </div>

  <div class="legend">
    <span class="legend-item"><span class="legend-dot dot-owned"></span> Owned library</span>
    <span class="legend-item"><span class="legend-dot dot-kindle"></span> Kindle</span>
    <span class="legend-item"><span class="legend-dot dot-borrowed"></span> Borrowed</span>
    <span class="legend-item"><span class="legend-dot dot-current"></span> Currently reading</span>
  </div>
</main>

<script>
'use strict';

const API_BASE = 'https://aijo86kijl.execute-api.us-east-1.amazonaws.com';
const API      = '/v1/reading/reads';

let allItems     = [];
let dataset      = null;
let mainTimeline = null;
let scrubMin     = 0;   // ms — full time range of all items
let scrubMax     = 0;

// ── Helpers ───────────────────────────────────────────────────────────────────

function isoToDate(iso) {
  // Accepts YYYY-MM-DD or full ISO string
  return iso ? new Date(iso.length === 10 ? iso + 'T12:00:00Z' : iso) : null;
}

function readClass(read) {
  if (!read.book) return 'owned';
  const tags   = (read.book.tags ?? []).map(s => String(s).toLowerCase());
  const format = (read.format ?? '').toLowerCase();
  if (format === 'kindle')          return 'kindle';
  if (format === 'audiobook')       return 'kindle';   // same neutral style
  if (tags.includes('borrowed'))    return 'borrowed';
  if (tags.includes('kindle'))      return 'kindle';
  return 'owned';
}

function stars(rating) {
  if (!rating || rating <= 0) return '';
  return '★'.repeat(Math.round(rating)) + '☆'.repeat(5 - Math.round(rating));
}

function buildItems(reads) {
  const items = [];
  let id = 0;
  const now = new Date();
  for (const read of reads) {
    const start = isoToDate(read.started);
    const end   = isoToDate(read.finished);
    if (!start && !end) continue;
    const effectiveStart = start ?? end;  // use finish as point if no start
    const isCurrent      = !end;
    const book           = read.book ?? {};
    const cls            = isCurrent ? 'current' : readClass(read);
    const grLink         = book.goodreadsUrl
      ? `<a href="${book.goodreadsUrl}" target="_blank" style="color:#96c860">GoodReads ↗</a>`
      : (book.title
          ? `<a href="https://www.goodreads.com/search?q=${encodeURIComponent(book.title + ' ' + (book.author ?? ''))}" target="_blank" style="color:#859e6a">Search GoodReads ↗</a>`
          : '');
    const starsHtml = stars(read.rating);
    const tags = book.tags ?? [];
    const tooltip = [
      `<b>${book.title || 'Unknown'}</b>`,
      book.author  ? `by ${book.author}`             : '',
      read.format  ? `Format: ${read.format}`        : '',
      starsHtml,
      read.started  ? `Started:  ${read.started}`   : '',
      read.finished ? `Finished: ${read.finished}`  : '<i>Currently reading</i>',
      read.review   ? `<i>${read.review.substring(0,120)}${read.review.length > 120 ? '…' : ''}</i>` : '',
      tags.length   ? `Tags: ${tags.join(', ')}`     : '',
      grLink,
    ].filter(Boolean).join('<br>');
    items.push({
      id:        id++,
      content:   book.title || 'Unknown',
      start:     effectiveStart,
      end:       end ?? now,
      title:     tooltip,
      className: cls,
      _class:    cls,
    });
  }
  return items;
}

// ── Canvas scrubber ───────────────────────────────────────────────────────────

const FILL   = { owned: '#1a3460', kindle: '#333',    borrowed: '#1a3828', current: '#3a1818' };
const STROKE = { owned: '#5588cc', kindle: '#888888', borrowed: '#44aa66', current: '#cc4444' };

function drawScrubber() {
  const canvas = document.getElementById('overview-canvas');
  if (!canvas || !scrubMax) return;
  const ctx = canvas.getContext('2d');
  const W = canvas.width;
  const H = canvas.height;
  const span = scrubMax - scrubMin;

  function tx(ms) { return (ms - scrubMin) / span * W; }

  // Background
  ctx.fillStyle = '#162414';
  ctx.fillRect(0, 0, W, H);

  // Year tick marks
  ctx.strokeStyle = '#2a3e20';
  ctx.fillStyle   = '#859e6a';
  ctx.font        = '10px -apple-system,sans-serif';
  ctx.lineWidth   = 1;
  const y0 = new Date(scrubMin).getFullYear();
  const y1 = new Date(scrubMax).getFullYear();
  for (let y = y0; y <= y1; y++) {
    const x = Math.round(tx(Date.UTC(y, 0, 1)));
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H - 14); ctx.stroke();
    ctx.fillText(String(y), x + 2, H - 3);
  }

  // Book bars
  const barTop = 2, barH = H - 18;
  for (const it of allItems) {
    const x1 = tx(it.start.getTime());
    const x2 = tx(it.end.getTime());
    const w  = Math.max(2, x2 - x1);
    ctx.fillStyle = FILL[it._class] || FILL.owned;
    ctx.fillRect(x1, barTop, w, barH);
    if (w > 3) {
      ctx.strokeStyle = STROKE[it._class] || STROKE.owned;
      ctx.strokeRect(x1 + 0.5, barTop + 0.5, w - 1, barH - 1);
    }
  }

  // Viewport indicator
  if (mainTimeline) {
    const win = mainTimeline.getWindow();
    const vx1 = tx(win.start.getTime());
    const vx2 = tx(win.end.getTime());
    const vw  = Math.max(4, vx2 - vx1);
    ctx.fillStyle   = 'rgba(120,168,78,0.18)';
    ctx.fillRect(vx1, 0, vw, H);
    ctx.strokeStyle = '#78a84e';
    ctx.lineWidth   = 2;
    ctx.strokeRect(vx1 + 1, 1, vw - 2, H - 2);
  }
}

function scrubToX(clientX) {
  const canvas = document.getElementById('overview-canvas');
  const rect   = canvas.getBoundingClientRect();
  const pct    = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  const time   = scrubMin + pct * (scrubMax - scrubMin);
  const win    = mainTimeline.getWindow();
  const half   = (win.end - win.start) / 2;
  mainTimeline.setWindow(
    new Date(time - half),
    new Date(time + half),
    { animation: false }
  );
  drawScrubber();
}

function setupScrubber() {
  const canvas = document.getElementById('overview-canvas');

  // Size canvas pixels to match its CSS display size
  function resize() {
    canvas.width = canvas.offsetWidth;
    drawScrubber();
  }
  new ResizeObserver(resize).observe(canvas);
  resize();

  // Mouse
  let down = false;
  canvas.addEventListener('mousedown', e => { down = true; scrubToX(e.clientX); });
  document.addEventListener('mousemove', e => { if (down) scrubToX(e.clientX); });
  document.addEventListener('mouseup',   () => { down = false; });

  // Touch
  canvas.addEventListener('touchstart', e => {
    scrubToX(e.touches[0].clientX); e.preventDefault();
  }, { passive: false });
  canvas.addEventListener('touchmove', e => {
    scrubToX(e.touches[0].clientX); e.preventDefault();
  }, { passive: false });
}

// ── Filter ────────────────────────────────────────────────────────────────────

function applyFilter(filterVal) {
  if (!dataset) return;
  const filtered = filterVal === 'all'
    ? allItems
    : allItems.filter(it => it._class === filterVal);
  dataset.clear();
  dataset.add(filtered);
  if (mainTimeline && filtered.length) mainTimeline.fit();
  drawScrubber();
}

// ── Init ──────────────────────────────────────────────────────────────────────

async function init() {
  try {
    const res = await fetch(`${API_BASE}${API}`);
    if (!res.ok) {
      const body = await res.json().catch(() => ({}));
      throw new Error(`API error ${res.status}: ${body.error ?? ''}`);
    }
    const data = await res.json();
    if (!data.reads) throw new Error('No reading data returned');

    allItems = buildItems(data.reads);
    dataset  = new vis.DataSet(allItems);

    // ── Scrubber time bounds ──
    scrubMin = Math.min(...allItems.map(it => it.start.getTime()));
    scrubMax = Math.max(...allItems.map(it => it.end.getTime()));

    // ── Default window: last 18 months ──
    const finishedDates = allItems
      .filter(it => it._class !== 'current')
      .map(it => it.end.getTime());
    const latestMs = finishedDates.length ? Math.max(...finishedDates) : Date.now();
    const latest   = new Date(latestMs + 30  * 24 * 3600 * 1000);  // +1 month padding
    const earliest = new Date(latestMs - 548 * 24 * 3600 * 1000);  // −18 months

    // ── Main timeline ──
    const mainOptions = {
      start:  earliest,
      end:    latest,
      orientation: { axis: 'top', item: 'bottom' },
      stack:       true,
      selectable:  true,
      moveable:    true,
      zoomable:    true,
      zoomMin: 1000 * 60 * 60 * 24 * 14,       // min zoom: 2 weeks
      zoomMax: 1000 * 60 * 60 * 24 * 365 * 5,  // max zoom: 5 years
      tooltip:  { followMouse: true, overflowMethod: 'cap' },
      margin:   { item: { horizontal: 2, vertical: 4 } },
    };

    document.getElementById('loading').style.display  = 'none';
    document.getElementById('timeline').style.display = 'block';
    document.getElementById('overview-section').style.display = 'block';

    mainTimeline = new vis.Timeline(
      document.getElementById('timeline'),
      dataset,
      mainOptions,
    );

    // Redraw scrubber whenever main window changes
    mainTimeline.on('rangechange',  drawScrubber);
    mainTimeline.on('rangechanged', drawScrubber);

    setupScrubber();

    document.getElementById('filter-tag').addEventListener('change', e => {
      applyFilter(e.target.value);
    });

  } catch (e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('timeline-wrap').innerHTML =
      `<div id="error">Failed to load books: ${e.message}</div>`;
    console.error(e);
  }
}

init();
</script>
</body>
</html>

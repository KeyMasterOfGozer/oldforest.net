<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Old Forest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f7f5f0;
      --surface: #ffffff;
      --border:  #e2ddd6;
      --text:    #2c2c2c;
      --muted:   #7a7060;
      --accent:  #2d6a4f;
      --accent2: #40916c;
      --danger:  #c0392b;
      --radius:  8px;
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .header-inner { max-width: 600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .site-title { font-size: 20px; font-weight: 700; color: var(--accent); font-family: Georgia, serif; }

    main { max-width: 600px; margin: 0 auto; padding: 48px 24px; }

    .back-link { font-size: 14px; color: var(--muted); display: inline-flex; align-items: center; gap: 4px; margin-bottom: 32px; }
    .back-link:hover { color: var(--accent); text-decoration: none; }

    h1 { font-size: 26px; margin-bottom: 32px; font-family: Georgia, serif; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 32px; margin-bottom: 24px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
      width: 100%;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); background: var(--surface); }
    input[readonly] { color: var(--muted); cursor: default; }

    .form-actions { display: flex; justify-content: flex-end; margin-top: 8px; }

    button { cursor: pointer; font-size: 14px; font-weight: 500; border: none; border-radius: var(--radius); padding: 9px 20px; transition: opacity .15s; }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }

    .alert { border-radius: var(--radius); padding: 10px 14px; font-size: 14px; margin-top: 12px; display: none; }
    .alert-success { background: #edf7f1; color: #1e5c38; border: 1px solid #b7dfc9; }
    .alert-error   { background: #fdf0f0; color: var(--danger); border: 1px solid #f0c0c0; }

    .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="site-title" href="/">🌲 Old Forest</a>
  </div>
</header>

<main>
  <a class="back-link" href="/">← Back to site</a>
  <h1>Your Profile</h1>

  <!-- Account info -->
  <div class="card">
    <h2>Account</h2>
    <div class="form-group">
      <label>Email</label>
      <input id="f-email" type="email" readonly>
    </div>
    <div class="form-group">
      <label>Display Name</label>
      <input id="f-name" type="text" placeholder="Your name">
      <span class="hint">Shown on your posts and in the site header.</span>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="btn-save-name">Save</button>
    </div>
    <div class="alert alert-success" id="name-success">Display name updated.</div>
    <div class="alert alert-error"   id="name-error"></div>
  </div>

  <!-- Change password -->
  <div class="card">
    <h2>Change Password</h2>
    <div class="form-group">
      <label>Current Password</label>
      <input id="f-old-pw" type="password" autocomplete="current-password">
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input id="f-new-pw" type="password" autocomplete="new-password">
      <span class="hint">At least 12 characters, with uppercase, lowercase, and numbers.</span>
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input id="f-confirm-pw" type="password" autocomplete="new-password">
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="btn-change-pw">Change Password</button>
    </div>
    <div class="alert alert-success" id="pw-success">Password changed successfully.</div>
    <div class="alert alert-error"   id="pw-error"></div>
  </div>
</main>

<script>
'use strict';

const CFG = {
  apiBase: 'https://icqes4ud42.execute-api.us-east-1.amazonaws.com',
};

function parseJWT(token) {
  try { return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  catch { return {}; }
}

function showAlert(id, message) {
  const el = document.getElementById(id);
  if (message) el.textContent = message;
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}

// ── API helper ────────────────────────────────
async function apiFetch(path, opts = {}) {
  const token = sessionStorage.getItem('access_token');
  const res = await fetch(`${CFG.apiBase}${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      Authorization: `Bearer ${token}`,
      ...(opts.headers || {}),
    },
  });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
  return data;
}

// ── Init ──────────────────────────────────────
function init() {
  const accessToken = sessionStorage.getItem('access_token');
  const idToken     = sessionStorage.getItem('id_token');

  if (!accessToken) {
    window.location.href = '/index.html';
    return;
  }

  const idClaims = parseJWT(idToken || '');
  document.getElementById('f-email').value = idClaims.email || '';
  document.getElementById('f-name').value  = idClaims.name  || '';

  // ── Save display name ────────────────────────
  document.getElementById('btn-save-name').onclick = async () => {
    const btn  = document.getElementById('btn-save-name');
    const name = document.getElementById('f-name').value.trim();
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      await apiFetch('/v1/profile', {
        method: 'PUT',
        body: JSON.stringify({ name }),
      });
      showAlert('name-success');
    } catch (e) {
      showAlert('name-error', e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save';
    }
  };

  // ── Change password ──────────────────────────
  document.getElementById('btn-change-pw').onclick = async () => {
    const btn     = document.getElementById('btn-change-pw');
    const oldPw   = document.getElementById('f-old-pw').value;
    const newPw   = document.getElementById('f-new-pw').value;
    const confirm = document.getElementById('f-confirm-pw').value;

    if (!oldPw || !newPw) {
      showAlert('pw-error', 'Please fill in all fields.');
      return;
    }
    if (newPw !== confirm) {
      showAlert('pw-error', 'New passwords do not match.');
      return;
    }
    if (newPw.length < 12) {
      showAlert('pw-error', 'New password must be at least 12 characters.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Changing…';
    try {
      await apiFetch('/v1/profile/password', {
        method: 'POST',
        body: JSON.stringify({ oldPassword: oldPw, newPassword: newPw }),
      });
      document.getElementById('f-old-pw').value     = '';
      document.getElementById('f-new-pw').value     = '';
      document.getElementById('f-confirm-pw').value = '';
      showAlert('pw-success');
    } catch (e) {
      showAlert('pw-error', e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Change Password';
    }
  };
}

init();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Old Forest</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0d1a0b;
      --surface: #162414;
      --border:  #2a3e20;
      --text:    #e8d8b0;
      --muted:   #859e6a;
      --accent:  #78a84e;
      --accent2: #96c860;
      --danger:  #c05848;
      --radius:  8px;
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .header-inner { max-width: 600px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .site-title { font-size: 20px; font-weight: 700; color: var(--accent); font-family: Georgia, serif; }

    main { max-width: 600px; margin: 0 auto; padding: 48px 24px; }

    .back-link { font-size: 14px; color: var(--muted); display: inline-flex; align-items: center; gap: 4px; margin-bottom: 32px; }
    .back-link:hover { color: var(--accent); text-decoration: none; }

    h1 { font-size: 26px; margin-bottom: 32px; font-family: Georgia, serif; }

    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 32px; margin-bottom: 24px; }
    .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--border); }

    .form-group { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
      width: 100%;
      outline: none;
      transition: border-color .15s;
    }
    input:focus { border-color: var(--accent); background: var(--surface); }
    input[readonly] { color: var(--muted); cursor: default; }

    .form-actions { display: flex; justify-content: flex-end; margin-top: 8px; }

    button { cursor: pointer; font-size: 14px; font-weight: 500; border: none; border-radius: var(--radius); padding: 9px 20px; transition: opacity .15s; }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline { background: transparent; color: var(--accent); border: 1px solid var(--accent); }

    .alert { border-radius: var(--radius); padding: 10px 14px; font-size: 14px; margin-top: 12px; display: none; }
    .alert-success { background: #0e2a18; color: #78d898; border: 1px solid #1e5030; }
    .alert-error   { background: #2a0e0e; color: #e07878; border: 1px solid #501818; }

    .hint { font-size: 12px; color: var(--muted); margin-top: 4px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="site-title" href="/">🌳 Old Forest</a>
  </div>
</header>

<main>
  <a class="back-link" href="/">← Back to site</a>
  <h1>Your Profile</h1>

  <!-- Account info -->
  <div class="card">
    <h2>Account</h2>
    <div class="form-group">
      <label>Email</label>
      <input id="f-email" type="email" readonly>
    </div>
    <div class="form-group">
      <label>Display Name</label>
      <input id="f-name" type="text" placeholder="Your name">
      <span class="hint">Shown on your posts and in the site header.</span>
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="btn-save-name">Save</button>
    </div>
    <div class="alert alert-success" id="name-success">Display name updated.</div>
    <div class="alert alert-error"   id="name-error"></div>
  </div>

  <!-- Change password -->
  <div class="card">
    <h2>Change Password</h2>
    <div class="form-group">
      <label>Current Password</label>
      <input id="f-old-pw" type="password" autocomplete="current-password">
    </div>
    <div class="form-group">
      <label>New Password</label>
      <input id="f-new-pw" type="password" autocomplete="new-password">
      <span class="hint">At least 12 characters, with uppercase, lowercase, and numbers.</span>
    </div>
    <div class="form-group">
      <label>Confirm New Password</label>
      <input id="f-confirm-pw" type="password" autocomplete="new-password">
    </div>
    <div class="form-actions">
      <button class="btn-primary" id="btn-change-pw">Change Password</button>
    </div>
    <div class="alert alert-success" id="pw-success">Password changed successfully.</div>
    <div class="alert alert-error"   id="pw-error"></div>
  </div>
</main>

<script>
'use strict';

const CFG = {
  apiBase:       'https://aijo86kijl.execute-api.us-east-1.amazonaws.com',
  cognitoDomain: 'auth-165395066552.auth.us-east-1.amazoncognito.com',
  clientId:      '71fv32ot0raceh7mt5lqgjvbto',
};

function parseJWT(token) {
  try { return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  catch { return {}; }
}

function showAlert(id, message, persistent) {
  const el = document.getElementById(id);
  if (message) el.textContent = message;
  el.style.display = 'block';
  if (!persistent) setTimeout(() => { el.style.display = 'none'; }, 4000);
}

// ── Token refresh ─────────────────────────────
async function refreshTokens() {
  const refreshToken = sessionStorage.getItem('refresh_token');
  if (!refreshToken) {
    console.warn('[profile] No refresh_token in sessionStorage');
    return false;
  }
  try {
    const res = await fetch(`https://${CFG.cognitoDomain}/oauth2/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'refresh_token',
        client_id: CFG.clientId,
        refresh_token: refreshToken,
      }),
    });
    if (res.ok) {
      const tokens = await res.json();
      const newClaims = parseJWT(tokens.access_token || '');
      console.log('[profile] Token refreshed OK | token_use:', newClaims.token_use,
        '| exp:', newClaims.exp ? new Date(newClaims.exp * 1000).toISOString() : 'n/a',
        '| access_token present:', !!tokens.access_token);
      sessionStorage.setItem('access_token', tokens.access_token);
      if (tokens.id_token) sessionStorage.setItem('id_token', tokens.id_token);
      return true;
    } else {
      const body = await res.json().catch(() => ({}));
      console.error('[profile] Token refresh failed:', res.status, body);
      return false;
    }
  } catch (e) {
    console.error('[profile] Token refresh error:', e);
    return false;
  }
}

// ── API helper ────────────────────────────────
async function apiFetch(path, opts = {}) {
  async function attempt() {
    const token = sessionStorage.getItem('access_token');
    const claims = parseJWT(token || '');
    console.log('[profile] API', opts.method || 'GET', path,
      '| token_use:', claims.token_use,
      '| exp:', claims.exp ? new Date(claims.exp * 1000).toISOString() : 'n/a',
      '| client_id/aud:', claims.client_id || claims.aud || 'n/a');
    return fetch(`${CFG.apiBase}${path}`, {
      ...opts,
      headers: {
        'Content-Type': 'application/json',
        Authorization: `Bearer ${token}`,
        ...(opts.headers || {}),
      },
    });
  }

  let res = await attempt();
  console.log('[profile] First attempt status:', res.status);

  if (res.status === 401) {
    const body401 = await res.json().catch(() => ({}));
    console.error('[profile] 401 body (first):', JSON.stringify(body401));
    console.log('[profile] Attempting token refresh…');
    const ok = await refreshTokens();
    console.log('[profile] Refresh result:', ok);
    res = await attempt();
    console.log('[profile] Retry status:', res.status);
  }

  if (res.status === 401) {
    const body401 = await res.json().catch(() => ({}));
    console.error('[profile] 401 body (after refresh):', JSON.stringify(body401));
    throw new Error(body401.message || 'Session expired. Please sign out and sign back in.');
  }

  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.message || `HTTP ${res.status}`);
  return data;
}

// ── Init ──────────────────────────────────────
async function init() {
  let accessToken = sessionStorage.getItem('access_token');

  if (!accessToken) {
    window.location.href = '/index.html';
    return;
  }

  // Proactively refresh so the token is always fresh on this page
  await refreshTokens();

  const idClaims = parseJWT(sessionStorage.getItem('id_token') || '');
  document.getElementById('f-email').value = idClaims.email || '';
  document.getElementById('f-name').value  = idClaims.name  || '';

  // ── Save display name ────────────────────────
  document.getElementById('btn-save-name').onclick = async () => {
    const btn  = document.getElementById('btn-save-name');
    const name = document.getElementById('f-name').value.trim();
    btn.disabled = true;
    btn.textContent = 'Saving…';
    try {
      await apiFetch('/v1/profile', {
        method: 'PUT',
        body: JSON.stringify({ name }),
      });
      // Refresh tokens so ID token reflects the new name
      await refreshTokens();
      // Update the name field to confirm what was saved
      document.getElementById('f-name').value = name;
      showAlert('name-success');
    } catch (e) {
      showAlert('name-error', e.message, e.message.includes('expired'));
    } finally {
      btn.disabled = false;
      btn.textContent = 'Save';
    }
  };

  // ── Change password ──────────────────────────
  document.getElementById('btn-change-pw').onclick = async () => {
    const btn     = document.getElementById('btn-change-pw');
    const oldPw   = document.getElementById('f-old-pw').value;
    const newPw   = document.getElementById('f-new-pw').value;
    const confirm = document.getElementById('f-confirm-pw').value;

    if (!oldPw || !newPw) {
      showAlert('pw-error', 'Please fill in all fields.');
      return;
    }
    if (newPw !== confirm) {
      showAlert('pw-error', 'New passwords do not match.');
      return;
    }
    if (newPw.length < 12) {
      showAlert('pw-error', 'New password must be at least 12 characters.');
      return;
    }

    btn.disabled = true;
    btn.textContent = 'Changing…';
    try {
      await apiFetch('/v1/profile/password', {
        method: 'POST',
        body: JSON.stringify({ oldPassword: oldPw, newPassword: newPw }),
      });
      document.getElementById('f-old-pw').value     = '';
      document.getElementById('f-new-pw').value     = '';
      document.getElementById('f-confirm-pw').value = '';
      showAlert('pw-success');
    } catch (e) {
      showAlert('pw-error', e.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Change Password';
    }
  };
}

init();
</script>
</body>
</html>

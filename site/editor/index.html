<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>oldforest — Editor</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.css">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #090f08;
      --surface:  #101a0d;
      --border:   #1e3018;
      --text:     #ddd4b0;
      --muted:    #7a8e64;
      --accent:   #6ca048;
      --danger:   #b84040;
      --radius:   6px;
    }

    body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 15px; min-height: 100vh; }

    /* ── Header ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; position: sticky; top: 0; z-index: 100; }
    .header-inner { display: flex; align-items: center; height: 56px; }
    .site-title { font-size: 20px; font-weight: 700; color: var(--accent); letter-spacing: -.3px; font-family: Georgia, serif; white-space: nowrap; text-decoration: none; margin-right: 20px; }
    .header-nav { display: flex; align-items: center; gap: 14px; flex: 1; }
    .header-auth { display: flex; align-items: center; gap: 10px; font-family: -apple-system, sans-serif; white-space: nowrap; }
    #user-email, #user-name { color: var(--muted); font-size: 13px; }
    .nav-link { font-family: -apple-system, sans-serif; font-size: 13px; color: var(--muted); text-decoration: none; transition: color .15s; }
    .nav-link:hover { color: var(--accent); }
    .rss-link { display: inline-flex; align-items: center; gap: 5px; font-family: -apple-system, sans-serif; font-size: 12px; font-weight: 600; color: #fff; background: #f26522; border-radius: 4px; padding: 3px 7px; text-decoration: none; transition: opacity .15s; white-space: nowrap; }
    .rss-link:hover { opacity: .85; color: #fff; text-decoration: none; }

    /* ── Layout ── */

    main { max-width: 1100px; margin: 0 auto; padding: 32px 24px; }

    /* ── Buttons ── */
    button { cursor: pointer; border: none; border-radius: var(--radius); font-size: 13px; font-weight: 500; padding: 7px 16px; transition: opacity .15s; }
    button:hover { opacity: .85; }
    button:disabled { opacity: .4; cursor: not-allowed; }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
    .btn-danger   { background: var(--danger); color: #fff; }
    .btn-ghost    { background: transparent; color: var(--muted); padding: 7px 10px; }
    .btn-ghost:hover { color: var(--text); opacity: 1; }

    /* ── Post list ── */
    #list-view h2 { font-size: 20px; margin-bottom: 20px; }
    .list-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }

    table { width: 100%; border-collapse: collapse; }
    th { text-align: left; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; padding: 10px 12px; border-bottom: 1px solid var(--border); }
    td { padding: 12px; border-bottom: 1px solid var(--border); vertical-align: middle; }
    tr:hover td { background: var(--surface); }
    .post-title { font-weight: 500; }
    .post-slug  { font-size: 12px; color: var(--muted); margin-top: 2px; }
    .badge { display: inline-block; font-size: 11px; font-weight: 600; padding: 2px 8px; border-radius: 20px; }
    .badge-published { background: #1e3a2a; color: var(--accent); }
    .badge-draft     { background: #2e2e1e; color: #c8b450; }
    .badge-public    { background: #1e2a3a; color: #6aabdf; }
    .badge-members   { background: #2e1e3a; color: #b07ada; }
    .badge-personal  { background: #1e2e2e; color: #5abcb0; }
    .row-actions { display: flex; gap: 8px; }

    .empty-state { text-align: center; padding: 60px 0; color: var(--muted); }
    .empty-state p { margin-bottom: 16px; }

    /* ── Editor form ── */
    #editor-view { display: none; }
    .editor-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 28px; }
    .editor-actions { display: flex; gap: 10px; }

    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }
    .form-group { display: flex; flex-direction: column; gap: 6px; }
    .form-group.full { grid-column: 1 / -1; }
    label { font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .4px; }
    input, textarea, select {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      padding: 9px 12px;
      width: 100%;
      outline: none;
      transition: border-color .15s;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--accent); }
    textarea { resize: vertical; min-height: 70px; }
    select option { background: var(--surface); }

    .toggles { display: flex; gap: 20px; margin-bottom: 16px; }
    .toggle-group { display: flex; align-items: center; gap: 10px; }
    .toggle-group label { text-transform: none; letter-spacing: 0; font-size: 14px; font-weight: 400; color: var(--text); margin-bottom: 0; }
    .toggle-group select { width: auto; }

    /* EasyMDE overrides */
    .editor-wrapper { margin-bottom: 16px; }
    .CodeMirror { background: var(--surface) !important; color: var(--text) !important; border: 1px solid var(--border) !important; border-top: none !important; border-radius: 0 0 var(--radius) var(--radius) !important; }
    .editor-toolbar { background: var(--surface) !important; border: 1px solid var(--border) !important; border-radius: var(--radius) var(--radius) 0 0 !important; }
    .editor-toolbar button { background: transparent !important; border: none !important; color: var(--muted) !important; }
    .editor-toolbar button:hover, .editor-toolbar button.active { color: var(--accent) !important; background: transparent !important; }
    .editor-toolbar i.separator { border-color: var(--border) !important; }
    .editor-preview { background: var(--surface) !important; color: var(--text) !important; }
    .editor-preview pre { background: var(--bg) !important; }

    /* ── Notification ── */
    #toast { position: fixed; bottom: 24px; right: 24px; padding: 12px 20px; border-radius: var(--radius); font-size: 14px; font-weight: 500; opacity: 0; transition: opacity .25s; pointer-events: none; z-index: 9999; }
    #toast.show { opacity: 1; }
    #toast.success { background: #1e3a2a; color: var(--accent); border: 1px solid var(--accent); }
    #toast.error   { background: #3a1e1e; color: var(--danger); border: 1px solid var(--danger); }

    /* ── Loading ── */
    #loading { display: flex; align-items: center; justify-content: center; height: 200px; color: var(--muted); }

    /* ── Auth screen ── */
    #auth-screen { display: none; flex-direction: column; align-items: center; justify-content: center; height: 80vh; gap: 16px; }
    #auth-screen h2 { font-size: 22px; }
    #auth-screen p  { color: var(--muted); }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="site-title" href="/">🌳 Old Forest</a>
    <nav class="header-nav" id="header-nav">
      <a href="/v1/feed.xml" class="rss-link" title="RSS Feed"><svg width="11" height="11" viewBox="0 0 8 8" fill="currentColor" aria-hidden="true"><circle cx="1" cy="7" r="1"/><path d="M0 4q4 0 4 4h1.5Q5.5 2.5 0 2.5z"/><path d="M0 1Q7 1 7 8h1.5Q8.5-.5 0-.5z"/></svg> RSS</a>
      <a href="/" class="nav-link">Blog</a>
      <a href="/apps.html" class="nav-link">Apps</a>
      <a id="admin-link" href="/admin/index.html" class="nav-link" style="display:none;">Admin</a>
    </nav>
    <div class="header-auth">
      <span id="user-email"></span>
      <button class="btn-outline" id="btn-logout">Sign out</button>
    </div>
  </div>
</header>

<main>
  <!-- Auth screen -->
  <div id="auth-screen">
    <h2>Sign in to continue</h2>
    <p>You need an editor account to access this page.</p>
    <button class="btn-primary" id="btn-login">Sign in with Cognito</button>
  </div>

  <!-- Post list -->
  <div id="list-view">
    <div class="list-toolbar">
      <h2>Posts</h2>
      <button class="btn-primary" id="btn-new-post">+ New Post</button>
    </div>
    <div id="loading">Loading posts…</div>
    <table id="posts-table" style="display:none">
      <thead>
        <tr>
          <th>Title</th>
          <th>Status</th>
          <th>Visibility</th>
          <th>Created</th>
          <th>Updated</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="posts-tbody"></tbody>
    </table>
    <div id="empty-state" class="empty-state" style="display:none">
      <p>No posts yet.</p>
      <button class="btn-primary" id="btn-first-post">Write your first post</button>
    </div>
  </div>

  <!-- Editor -->
  <div id="editor-view">
    <div class="editor-toolbar">
      <button class="btn-ghost" id="btn-back">← Back to posts</button>
      <div class="editor-actions">
        <button class="btn-secondary" id="btn-save-draft">Save Draft</button>
        <button class="btn-primary" id="btn-publish">Publish</button>
      </div>
    </div>

    <div class="form-grid">
      <div class="form-group full">
        <label for="f-title">Title</label>
        <input id="f-title" type="text" placeholder="Post title">
      </div>
      <div class="form-group">
        <label for="f-slug">Slug</label>
        <input id="f-slug" type="text" placeholder="post-slug">
      </div>
      <div class="form-group">
        <label for="f-created">Published Date</label>
        <input id="f-created" type="datetime-local">
      </div>
      <div class="form-group">
        <label for="f-tags">Tags (comma-separated)</label>
        <input id="f-tags" type="text" placeholder="nature, hiking, forest">
      </div>
      <div class="form-group full">
        <label for="f-summary">Summary</label>
        <textarea id="f-summary" placeholder="Short excerpt shown in post listings…"></textarea>
      </div>
      <div class="form-group full">
        <label>Thumbnail</label>
        <div style="display:flex;align-items:flex-start;gap:14px;">
          <div style="flex:1;display:flex;flex-direction:column;gap:8px;">
            <input id="f-thumbnail" type="text" placeholder="https://… or upload an image">
            <div style="display:flex;align-items:center;gap:10px;">
              <button class="btn-secondary" id="btn-upload-thumb" type="button">⬆ Upload image</button>
              <span id="thumb-upload-status" style="font-size:12px;color:var(--muted);"></span>
            </div>
            <input type="file" id="thumb-upload-input" accept="image/*" style="display:none">
          </div>
          <div id="thumb-preview" style="width:140px;height:90px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:12px;">
            No image
          </div>
        </div>
      </div>
    </div>

    <div class="toggles">
      <div class="toggle-group">
        <label for="f-visibility">Visibility</label>
        <select id="f-visibility">
          <option value="public">Public</option>
          <option value="members">Members only</option>
          <option value="personal">Personal (only you)</option>
        </select>
      </div>
    </div>

    <div class="editor-wrapper">
      <textarea id="f-content"></textarea>
    </div>

    <!-- Upload panel -->
    <div id="upload-panel" style="margin-bottom:16px;">
      <label style="font-size:12px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;display:block;margin-bottom:8px;">Attachments</label>
      <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap;">
        <button class="btn-secondary" id="btn-upload-file" type="button">⬆ Upload image / file</button>
        <span id="upload-status" style="font-size:13px;color:var(--muted);"></span>
      </div>
      <input type="file" id="file-upload-input" accept="image/*,.pdf,.txt,.md" style="display:none">
      <div id="uploaded-files" style="margin-top:10px;display:flex;flex-wrap:wrap;gap:8px;"></div>
    </div>
  </div>
</main>

<div id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/easymde@2.18.0/dist/easymde.min.js"></script>
<script>
'use strict';

// ─────────────────────────────────────────────
//  CONFIG  — update if resources are redeployed
// ─────────────────────────────────────────────
const CFG = {
  cognitoDomain:  'auth-165395066552.auth.us-east-1.amazoncognito.com',
  clientId:       '71fv32ot0raceh7mt5lqgjvbto',
  redirectUri:    'https://oldforest.net/editor/index.html',
  apiBase:        'https://aijo86kijl.execute-api.us-east-1.amazonaws.com',
  imagePublicBase: 'https://oldforest.net/images',
};

// ─────────────────────────────────────────────
//  STATE
// ─────────────────────────────────────────────
let accessToken = null;
let currentPost = null;  // null = new post
let easyMDE = null;
let postsCache = {};     // postId → post object, avoids JSON-in-HTML-attribute issues

// ─────────────────────────────────────────────
//  PKCE HELPERS
// ─────────────────────────────────────────────
function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function generatePKCE() {
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  return { verifier, challenge: b64url(digest) };
}

// ─────────────────────────────────────────────
//  AUTH
// ─────────────────────────────────────────────
async function login() {
  const { verifier, challenge } = await generatePKCE();
  sessionStorage.setItem('pkce_verifier', verifier);
  const params = new URLSearchParams({
    response_type: 'code',
    client_id: CFG.clientId,
    redirect_uri: CFG.redirectUri,
    scope: 'openid email profile aws.cognito.signin.user.admin',
    code_challenge_method: 'S256',
    code_challenge: challenge,
  });
  window.location.href = `https://${CFG.cognitoDomain}/oauth2/authorize?${params}`;
}

function logout() {
  accessToken = null;
  sessionStorage.clear();
  const params = new URLSearchParams({
    client_id: CFG.clientId,
    logout_uri: CFG.redirectUri,
  });
  window.location.href = `https://${CFG.cognitoDomain}/logout?${params}`;
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  if (!verifier) throw new Error('No PKCE verifier found');
  const res = await fetch(`https://${CFG.cognitoDomain}/oauth2/token`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code',
      client_id: CFG.clientId,
      redirect_uri: CFG.redirectUri,
      code,
      code_verifier: verifier,
    }),
  });
  if (!res.ok) throw new Error('Token exchange failed');
  const data = await res.json();
  sessionStorage.removeItem('pkce_verifier');
  return data;
}

function parseJWT(token) {
  try {
    return JSON.parse(atob(token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/')));
  } catch { return {}; }
}

function isTokenExpired(token) {
  if (!token) return true;
  const { exp } = parseJWT(token);
  if (!exp) return false;
  return (Date.now() / 1000) > (exp - 30);
}

async function refreshTokens() {
  const rt = sessionStorage.getItem('refresh_token');
  if (!rt) return false;
  try {
    const res = await fetch(`https://${CFG.cognitoDomain}/oauth2/token`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams({
        grant_type: 'refresh_token',
        client_id:     CFG.clientId,
        refresh_token: rt,
      }),
    });
    if (!res.ok) return false;
    const t = await res.json();
    accessToken = t.access_token;
    sessionStorage.setItem('access_token', t.access_token);
    if (t.id_token) sessionStorage.setItem('id_token', t.id_token);
    return true;
  } catch { return false; }
}

function handleSessionExpired() {
  accessToken = null;
  sessionStorage.clear();
  const p = document.querySelector('#auth-screen p');
  if (p) p.textContent = 'Your session has expired. Please sign in again.';
  showAuthScreen();
  toast('Session expired — please sign in again.', 'error');
}

// ─────────────────────────────────────────────
//  API
// ─────────────────────────────────────────────
async function apiFetch(path, opts = {}) {
  // Proactively refresh if we know the token is stale
  if (isTokenExpired(accessToken)) {
    if (!(await refreshTokens())) { handleSessionExpired(); throw new Error('Session expired'); }
  }

  const doFetch = () => fetch(`${CFG.apiBase}${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      Authorization: `Bearer ${accessToken}`,
      ...(opts.headers || {}),
    },
  });

  let res = await doFetch();

  // On unexpected 401, try one refresh + retry
  if (res.status === 401) {
    if (!(await refreshTokens())) { handleSessionExpired(); throw new Error('Session expired'); }
    res = await doFetch();
  }

  if (!res.ok) {
    const err = await res.json().catch(() => ({ message: res.statusText }));
    throw new Error(err.message || `HTTP ${res.status}`);
  }
  if (res.status === 204) return null;
  return res.json();
}

async function fetchPosts() {
  const data = await apiFetch('/v1/editor/posts');
  return data.posts ?? [];
}

async function fetchPost(postId) {
  // Get metadata from list, content from get-post endpoint
  const slug = currentPost?.slug;
  if (!slug) return null;
  return apiFetch(`/v1/posts/${slug}`);
}

async function savePost(fields) {
  if (currentPost) {
    return apiFetch(`/v1/editor/posts/${currentPost.postId}`, {
      method: 'PUT',
      body: JSON.stringify(fields),
    });
  } else {
    return apiFetch('/v1/editor/posts', {
      method: 'POST',
      body: JSON.stringify(fields),
    });
  }
}

async function deletePost(postId) {
  return apiFetch(`/v1/editor/posts/${postId}`, { method: 'DELETE' });
}

async function uploadImage(file) {
  const { uploadUrl, key } = await apiFetch('/v1/editor/upload', {
    method: 'POST',
    body: JSON.stringify({ filename: file.name, contentType: file.type }),
  });
  await fetch(uploadUrl, {
    method: 'PUT',
    body: file,
    headers: { 'Content-Type': file.type },
  });
  return `${CFG.imagePublicBase}/${key.replace('images/', '')}`;
}

// ─────────────────────────────────────────────
//  TOAST
// ─────────────────────────────────────────────
let toastTimer;
function toast(msg, type = 'success') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.className = ''; }, 3000);
}

// ─────────────────────────────────────────────
//  SLUG HELPER
// ─────────────────────────────────────────────
function slugify(str) {
  return str.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
}

// Convert ISO string to datetime-local input value (local time)
function isoToLocal(iso) {
  if (!iso) return '';
  const d = new Date(iso);
  if (isNaN(d)) return '';
  const pad = n => String(n).padStart(2, '0');
  return `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
}

// ─────────────────────────────────────────────
//  UI — POST LIST
// ─────────────────────────────────────────────
function showListView() {
  document.getElementById('list-view').style.display = '';
  document.getElementById('editor-view').style.display = 'none';
  currentPost = null;
  loadPosts();
}

async function loadPosts() {
  const loading = document.getElementById('loading');
  const table   = document.getElementById('posts-table');
  const empty   = document.getElementById('empty-state');
  loading.style.display = '';
  table.style.display = 'none';
  empty.style.display = 'none';

  try {
    const posts = await fetchPosts();
    loading.style.display = 'none';

    if (!posts.length) {
      empty.style.display = '';
      return;
    }

    posts.sort((a, b) => (b.updatedAt || b.createdAt || '').localeCompare(a.updatedAt || a.createdAt || ''));
    postsCache = {};
    posts.forEach(p => postsCache[p.postId] = p);
    const tbody = document.getElementById('posts-tbody');
    tbody.innerHTML = posts.map(p => `
      <tr>
        <td>
          <div class="post-title">${esc(p.title || '(untitled)')}</div>
          <div class="post-slug">${esc(p.slug || '')}</div>
        </td>
        <td><span class="badge badge-${p.status}">${esc(p.status)}</span></td>
        <td><span class="badge badge-${p.visibility}">${esc(p.visibility)}</span></td>
        <td style="color:var(--muted);font-size:13px">${fmtDate(p.createdAt)}</td>
        <td style="color:var(--muted);font-size:13px">${fmtDate(p.updatedAt || p.createdAt)}</td>
        <td>
          <div class="row-actions">
            <button class="btn-secondary" onclick="openEditor(postsCache['${esc(p.postId)}'])">Edit</button>
            <button class="btn-danger"    onclick="confirmDelete('${esc(p.postId)}', '${esc(p.title || 'this post')}')">Delete</button>
          </div>
        </td>
      </tr>
    `).join('');
    table.style.display = '';
  } catch (e) {
    loading.style.display = 'none';
    toast(`Failed to load posts: ${e.message}`, 'error');
  }
}

function esc(str) {
  return String(str ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function fmtDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

async function confirmDelete(postId, title) {
  if (!confirm(`Delete "${title}"? This cannot be undone.`)) return;
  try {
    await deletePost(postId);
    toast('Post deleted');
    loadPosts();
  } catch (e) {
    toast(`Delete failed: ${e.message}`, 'error');
  }
}

// ─────────────────────────────────────────────
//  UI — EDITOR
// ─────────────────────────────────────────────
function openEditor(post) {
  currentPost = post || null;

  document.getElementById('list-view').style.display = 'none';
  document.getElementById('editor-view').style.display = 'block';

  // Init EasyMDE lazily the first time the editor opens (element must be visible)
  if (!easyMDE) {
    try {
      easyMDE = new EasyMDE({
        element: document.getElementById('f-content'),
        spellChecker: false,
        autosave: { enabled: false },
        toolbar: [
          'bold', 'italic', 'strikethrough', '|',
          'heading-1', 'heading-2', 'heading-3', '|',
          'unordered-list', 'ordered-list', 'quote', '|',
          'link',
          {
            name: 'upload-image',
            action: () => document.getElementById('file-upload-input').click(),
            className: 'fa fa-upload',
            title: 'Upload image or file',
            noDisable: true,
          },
          '|',
          'preview', 'side-by-side', 'fullscreen', '|',
          'guide'
        ],
      });
    } catch (e) {
      console.error('EasyMDE init failed:', e);
    }
  }

  document.getElementById('f-title').value      = post?.title      ?? '';
  document.getElementById('f-slug').value       = post?.slug       ?? '';
  document.getElementById('f-created').value    = isoToLocal(post?.createdAt ?? '');
  document.getElementById('f-summary').value    = post?.summary    ?? '';
  document.getElementById('f-tags').value       = (post?.tags ?? []).join(', ');
  document.getElementById('f-visibility').value = post?.visibility ?? 'public';
  document.getElementById('f-thumbnail').value  = post?.thumbnail  ?? '';
  updateThumbPreview(post?.thumbnail ?? '');

  // Load content if editing existing post
  if (post?.postId) {
    loadPostContent(post.slug);
  } else {
    if (easyMDE) easyMDE.value('');
    else document.getElementById('f-content').value = '';
  }

  // Auto-generate slug from title
  document.getElementById('f-title').addEventListener('input', onTitleInput);
}

function onTitleInput(e) {
  const slugField = document.getElementById('f-slug');
  if (!currentPost) {
    slugField.value = slugify(e.target.value);
  }
}

async function loadPostContent(slug) {
  try {
    // Always use the authenticated members endpoint in the editor —
    // the public endpoint returns 403 for members-only posts.
    const data = await apiFetch(`/v1/posts/members/${slug}`);
    const content = data.content ?? '';
    if (easyMDE) easyMDE.value(content);
    else document.getElementById('f-content').value = content;
  } catch {
    if (easyMDE) easyMDE.value('');
    else document.getElementById('f-content').value = '';
  }
}

function collectFormData(status) {
  const title   = document.getElementById('f-title').value.trim();
  const slug    = document.getElementById('f-slug').value.trim() || slugify(title);
  const created = document.getElementById('f-created').value;
  return {
    title,
    slug,
    summary:    document.getElementById('f-summary').value.trim(),
    tags:       document.getElementById('f-tags').value.split(',').map(t => t.trim()).filter(Boolean),
    visibility: document.getElementById('f-visibility').value,
    thumbnail:  document.getElementById('f-thumbnail').value.trim(),
    content:    easyMDE ? easyMDE.value() : document.getElementById('f-content').value,
    status,
    // Only send createdAt when the field has a value (preserves existing date if left blank)
    ...(created ? { createdAt: new Date(created).toISOString() } : {}),
  };
}

async function handleSave(status) {
  const btn = status === 'published' ? document.getElementById('btn-publish') : document.getElementById('btn-save-draft');
  btn.disabled = true;
  btn.textContent = 'Saving…';
  try {
    const data = collectFormData(status);
    if (!data.title) { toast('Title is required', 'error'); return; }
    const result = await savePost(data);
    if (!currentPost) currentPost = result;  // update with server-assigned postId
    toast(status === 'published' ? 'Published!' : 'Draft saved');
  } catch (e) {
    toast(`Save failed: ${e.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = status === 'published' ? 'Publish' : 'Save Draft';
  }
}

// ─────────────────────────────────────────────
//  THUMBNAIL
// ─────────────────────────────────────────────
function updateThumbPreview(url) {
  const preview = document.getElementById('thumb-preview');
  if (!preview) return;
  if (url) {
    preview.innerHTML = `<img src="${url.replace(/"/g,'')}" style="width:100%;height:100%;object-fit:cover;" onerror="this.parentElement.innerHTML='<span style=color:var(--muted);font-size:12px>Bad URL</span>'">`;
  } else {
    preview.innerHTML = '<span style="color:var(--muted);font-size:12px">No image</span>';
  }
}

// ─────────────────────────────────────────────
//  INIT
// ─────────────────────────────────────────────
async function init() {
  // Check for OAuth callback code
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  if (code) {
    history.replaceState({}, '', window.location.pathname);
    try {
      const tokens = await exchangeCode(code);
      accessToken = tokens.access_token;
      sessionStorage.setItem('access_token', tokens.access_token);
      sessionStorage.setItem('id_token', tokens.id_token);
      if (tokens.refresh_token) sessionStorage.setItem('refresh_token', tokens.refresh_token);
    } catch (e) {
      toast(`Login failed: ${e.message}`, 'error');
      showAuthScreen();
      return;
    }
  } else {
    // Restore token from session
    accessToken = sessionStorage.getItem('access_token');
  }

  if (!accessToken) {
    showAuthScreen();
    return;
  }

  // Verify editor group membership
  const claims = parseJWT(accessToken);
  const groups = Array.isArray(claims['cognito:groups'])
    ? claims['cognito:groups']
    : String(claims['cognito:groups'] ?? '').split(',').map(g => g.trim());
  if (groups.includes('admins')) {
    document.getElementById('admin-link').style.display = 'inline-block';
  }
  if (!groups.includes('editors')) {
    toast('Your account does not have editor access.', 'error');
    showAuthScreen();
    return;
  }

  const idClaims = parseJWT(sessionStorage.getItem('id_token') || '');
  const displayName = idClaims.name || idClaims.email || claims.username || 'My Profile';
  const userEmailEl = document.getElementById('user-email');
  userEmailEl.innerHTML = `<a href="/profile.html" style="color:var(--muted);text-decoration:none;font-size:13px;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">${displayName.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</a>`;

  // Wire up buttons first — before anything that might throw
  document.getElementById('btn-logout').onclick     = logout;
  document.getElementById('btn-new-post').onclick   = () => openEditor(null);
  document.getElementById('btn-first-post').onclick = () => openEditor(null);
  document.getElementById('btn-back').onclick       = showListView;
  document.getElementById('btn-save-draft').onclick = () => handleSave('draft');
  document.getElementById('btn-publish').onclick    = () => handleSave('published');

  // ── File upload ──────────────────────────────
  document.getElementById('btn-upload-file').onclick = () =>
    document.getElementById('file-upload-input').click();

  document.getElementById('file-upload-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = ''; // reset so same file can be re-uploaded

    const statusEl = document.getElementById('upload-status');
    statusEl.textContent = `Uploading ${file.name}…`;
    try {
      const url = await uploadImage(file);
      const isImage = file.type.startsWith('image/');
      const md = isImage ? `![${file.name}](${url})` : `[${file.name}](${url})`;

      // Insert markdown at cursor (or at end if no editor)
      if (easyMDE) {
        easyMDE.codemirror.replaceSelection(md);
        easyMDE.codemirror.focus();
      } else {
        const ta = document.getElementById('f-content');
        const pos = ta.selectionStart ?? ta.value.length;
        ta.value = ta.value.slice(0, pos) + md + ta.value.slice(pos);
      }

      // Add a chip to the uploaded-files list
      const chip = document.createElement('span');
      chip.style.cssText = 'display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-size:12px;cursor:pointer;';
      chip.title = 'Click to copy URL';
      chip.innerHTML = `${isImage ? '🖼' : '📄'} ${esc(file.name)}`;
      chip.onclick = () => { navigator.clipboard.writeText(url); toast('URL copied!'); };
      document.getElementById('uploaded-files').appendChild(chip);

      statusEl.textContent = '';
      toast('Uploaded — markdown inserted');
    } catch (err) {
      statusEl.textContent = '';
      toast(`Upload failed: ${err.message}`, 'error');
    }
  });

  // ── Thumbnail upload ─────────────────────────
  document.getElementById('btn-upload-thumb').onclick = () =>
    document.getElementById('thumb-upload-input').click();

  document.getElementById('thumb-upload-input').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    e.target.value = '';
    const statusEl = document.getElementById('thumb-upload-status');
    statusEl.textContent = `Uploading…`;
    try {
      const url = await uploadImage(file);
      document.getElementById('f-thumbnail').value = url;
      updateThumbPreview(url);
      statusEl.textContent = '';
      toast('Thumbnail uploaded');
    } catch (err) {
      statusEl.textContent = '';
      toast(`Upload failed: ${err.message}`, 'error');
    }
  });

  document.getElementById('f-thumbnail').addEventListener('input', (e) => {
    updateThumbPreview(e.target.value.trim());
  });

  showListView();
}

function showAuthScreen() {
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('list-view').style.display   = 'none';
  document.getElementById('editor-view').style.display = 'none';
  document.getElementById('btn-login').onclick = login;
}

init();
</script>
</body>
</html>

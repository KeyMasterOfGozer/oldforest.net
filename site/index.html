<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Old Forest</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="alternate" type="application/rss+xml" title="Old Forest" href="https://oldforest.net/v1/feed.xml">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1a0b;
      --surface:  #162414;
      --border:   #2a3e20;
      --text:     #e8d8b0;
      --muted:    #859e6a;
      --accent:   #78a84e;
      --accent2:  #96c860;
      --members:  #c8904a;
      --radius:   8px;
    }

    body { background: var(--bg); color: var(--text); font-family: Georgia, 'Times New Roman', serif; line-height: 1.7; }

    a { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent2); text-decoration: underline; }

    /* ── Header ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .header-inner { max-width: 780px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .site-title { font-size: 22px; font-weight: 700; color: var(--accent); letter-spacing: -.3px; }
    .header-right { display: flex; align-items: center; gap: 14px; font-family: -apple-system, sans-serif; font-size: 14px; }
    #user-email { color: var(--muted); }

    /* ── Buttons ── */
    button { cursor: pointer; font-family: -apple-system, sans-serif; font-size: 13px; font-weight: 500; border: none; border-radius: var(--radius); padding: 7px 16px; transition: opacity .15s; }
    button:hover { opacity: .85; }
    .btn-primary  { background: var(--accent); color: #fff; }
    .btn-outline  { background: transparent; color: var(--accent); border: 1px solid var(--accent); }

    /* ── Main layout ── */
    main { max-width: 780px; margin: 0 auto; padding: 48px 24px; }

    .page-intro { margin-bottom: 40px; border-bottom: 1px solid var(--border); padding-bottom: 32px; }
    .page-intro h1 { font-size: 32px; color: var(--accent); margin-bottom: 8px; }
    .page-intro p  { color: var(--muted); font-size: 16px; }

    /* ── Post list ── */
    #posts-list { display: flex; flex-direction: column; gap: 32px; }

    .post-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 28px 32px; display: flex; gap: 24px; align-items: flex-start; }
    .post-card:hover { border-color: var(--accent2); }
    .post-card-body { flex: 1; min-width: 0; }
    .post-thumb { width: 160px; height: 110px; object-fit: cover; border-radius: calc(var(--radius) - 2px); flex-shrink: 0; }
    @media (max-width: 560px) { .post-thumb { display: none; } }

    .post-meta { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-family: -apple-system, sans-serif; font-size: 13px; color: var(--muted); }
    .badge-members { background: #2e1808; color: var(--members); border: 1px solid #5a3010; border-radius: 20px; padding: 2px 10px; font-size: 12px; font-weight: 600; }
    .tag { background: #162a10; color: var(--accent); border: 1px solid #2a4a18; border-radius: 20px; padding: 2px 10px; font-size: 12px; cursor: pointer; transition: background .15s; }
    .tag:hover { background: #1e3a18; }
    .tag.active { background: var(--accent); color: #0d1a0b; }

    /* ── Tag cloud ── */
    #tag-cloud { display: none; margin-bottom: 28px; }
    #tag-cloud-inner { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
    #tag-cloud-label { font-family: -apple-system, sans-serif; font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
    .tag-cloud-item { display: inline-flex; align-items: center; gap: 5px; background: #162a10; color: var(--accent); border: 1px solid #2a4a18; border-radius: 20px; padding: 4px 12px; font-size: 13px; cursor: pointer; transition: background .15s; font-family: -apple-system, sans-serif; }
    .tag-cloud-item:hover { background: #1e3a18; }
    .tag-cloud-item.active { background: var(--accent); color: #0d1a0b; border-color: var(--accent); }
    .tag-cloud-item .tag-count { font-size: 11px; opacity: .7; }

    /* ── Tag filter banner ── */
    #tag-filter-bar { display: none; align-items: center; gap: 10px; margin-bottom: 24px; padding: 10px 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); font-family: -apple-system, sans-serif; font-size: 14px; color: var(--muted); }
    #tag-filter-bar strong { color: var(--accent); }
    #tag-filter-bar button { background: none; border: none; color: var(--muted); font-size: 18px; line-height: 1; cursor: pointer; padding: 0 4px; }
    #tag-filter-bar button:hover { color: var(--text); }

    .post-card h2 { font-size: 22px; margin-bottom: 8px; line-height: 1.35; }
    .post-card h2 a { color: var(--text); }
    .post-card h2 a:hover { color: var(--accent); text-decoration: none; }
    .post-summary { color: var(--muted); font-size: 15px; line-height: 1.6; }

    .members-gate-inline { display: flex; align-items: center; gap: 12px; margin-top: 14px; padding-top: 14px; border-top: 1px solid var(--border); color: var(--muted); font-family: -apple-system, sans-serif; font-size: 13px; }

    /* ── States ── */
    .loading { text-align: center; padding: 60px 0; color: var(--muted); font-family: -apple-system, sans-serif; }
    .empty   { text-align: center; padding: 60px 0; color: var(--muted); }
    .empty h3 { font-size: 20px; margin-bottom: 8px; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="site-title" href="/">🌳 Old Forest</a>
    <div class="header-right">
      <a href="/apps.html" style="font-family:-apple-system,sans-serif;font-size:13px;color:var(--muted);text-decoration:none;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">Apps</a>
      <span id="user-email"></span>
      <button class="btn-outline" id="btn-auth">Sign in</button>
    </div>
  </div>
</header>

<main>
  <div class="page-intro">
    <h1>Old Forest</h1>
    <p>Stories and reflections from the digital forest.</p>
  </div>
  <div id="tag-cloud">
    <div id="tag-cloud-label">Filter by tag</div>
    <div id="tag-cloud-inner"></div>
  </div>
  <div id="tag-filter-bar">
    <span>Showing posts tagged: <strong id="active-tag-label"></strong></span>
    <button onclick="clearTagFilter()" title="Clear filter">×</button>
  </div>
  <div id="posts-list"><div class="loading">Loading…</div></div>
</main>

<script>
'use strict';

const CFG = {
  cognitoDomain:  'auth-165395066552.auth.us-east-1.amazoncognito.com',
  clientId:       '71fv32ot0raceh7mt5lqgjvbto',
  redirectUri:    'https://oldforest.net/index.html',
  apiBase:        'https://aijo86kijl.execute-api.us-east-1.amazonaws.com',
};

let accessToken = null;
let allPosts = [];

// ── PKCE ──────────────────────────────────────
function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generatePKCE() {
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  return { verifier, challenge: b64url(digest) };
}

// ── AUTH ──────────────────────────────────────
async function login() {
  const { verifier, challenge } = await generatePKCE();
  sessionStorage.setItem('pkce_verifier', verifier);
  // Only set return_to if not already pointing somewhere specific (e.g. profile page after 401)
  if (!sessionStorage.getItem('return_to')) {
    sessionStorage.setItem('return_to', window.location.href);
  }
  const p = new URLSearchParams({
    response_type: 'code', client_id: CFG.clientId,
    redirect_uri: CFG.redirectUri, scope: 'openid email profile aws.cognito.signin.user.admin',
    code_challenge_method: 'S256', code_challenge: challenge,
  });
  window.location.href = `https://${CFG.cognitoDomain}/oauth2/authorize?${p}`;
}

function logout() {
  accessToken = null;
  sessionStorage.clear();
  const p = new URLSearchParams({ client_id: CFG.clientId, logout_uri: CFG.redirectUri });
  window.location.href = `https://${CFG.cognitoDomain}/logout?${p}`;
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('pkce_verifier');
  const res = await fetch(`https://${CFG.cognitoDomain}/oauth2/token`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'authorization_code', client_id: CFG.clientId,
      redirect_uri: CFG.redirectUri, code, code_verifier: verifier,
    }),
  });
  if (!res.ok) throw new Error('Token exchange failed');
  return res.json();
}

function parseJWT(token) {
  try { return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  catch { return {}; }
}

// ── TAG FILTER ────────────────────────────────
function filterByTag(tag) {
  const url = new URL(window.location.href);
  url.searchParams.set('tag', tag);
  history.pushState({}, '', url);
  applyFilter();
}

function clearTagFilter() {
  const url = new URL(window.location.href);
  url.searchParams.delete('tag');
  history.pushState({}, '', url);
  applyFilter();
}

function buildTagCloud(posts) {
  const counts = {};
  posts.forEach(p => (p.tags ?? []).forEach(t => {
    counts[t] = (counts[t] || 0) + 1;
  }));
  const sorted = Object.entries(counts).sort((a, b) => b[1] - a[1] || a[0].localeCompare(b[0]));
  if (!sorted.length) return;

  const activeTag = new URLSearchParams(window.location.search).get('tag');
  document.getElementById('tag-cloud-inner').innerHTML = sorted.map(([t, n]) =>
    `<span class="tag-cloud-item${t === activeTag ? ' active' : ''}" onclick="filterByTag('${esc(t)}')">${esc(t)} <span class="tag-count">${n}</span></span>`
  ).join('');
  document.getElementById('tag-cloud').style.display = 'block';
}

function applyFilter() {
  const tag = new URLSearchParams(window.location.search).get('tag');
  const bar = document.getElementById('tag-filter-bar');

  // Update tag cloud active state
  document.querySelectorAll('.tag-cloud-item').forEach(el => {
    el.classList.toggle('active', el.textContent.trim().startsWith(tag || '\0'));
  });
  // Re-build so active highlight is accurate
  buildTagCloud(allPosts);

  if (tag) {
    document.getElementById('active-tag-label').textContent = tag;
    bar.style.display = 'flex';
  } else {
    bar.style.display = 'none';
  }

  const filtered = tag
    ? allPosts.filter(p => (p.tags ?? []).includes(tag))
    : allPosts;
  renderPosts(filtered);
}

// ── API ───────────────────────────────────────
async function fetchPosts() {
  // Editors get the editor endpoint so personal posts are included
  if (accessToken) {
    const claims = parseJWT(accessToken);
    const groups = claims['cognito:groups'] ?? [];
    const isEditor = Array.isArray(groups) ? groups.includes('editors') : String(groups).includes('editors');
    if (isEditor) {
      const res = await fetch(`${CFG.apiBase}/v1/editor/posts`, {
        headers: { Authorization: `Bearer ${accessToken}` },
      });
      if (res.ok) {
        const data = await res.json();
        const currentSub = claims.sub;
        // Show: published posts of any visibility, plus personal posts that belong to this user
        return (data.posts ?? []).filter(p =>
          p.status === 'published' && (p.visibility !== 'personal' || p.authorSub === currentSub)
        );
      }
    }
  }
  // Public fallback
  const res = await fetch(`${CFG.apiBase}/v1/posts`);
  if (!res.ok) throw new Error('Failed to load posts');
  const data = await res.json();
  return data.posts ?? [];
}

async function loadPosts() {
  try {
    allPosts = await fetchPosts();
    buildTagCloud(allPosts);
    applyFilter();
  } catch (e) {
    document.getElementById('posts-list').innerHTML =
      '<div class="loading">Failed to load posts. Please try again.</div>';
  }
}

// ── RENDER ────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function isMemberUser() {
  if (!accessToken) return false;
  const groups = parseJWT(accessToken)['cognito:groups'] ?? [];
  return groups.includes('members') || groups.includes('editors');
}

function renderPosts(posts) {
  const el = document.getElementById('posts-list');
  if (!posts.length) {
    el.innerHTML = '<div class="empty"><h3>No posts yet</h3><p>Check back soon.</p></div>';
    return;
  }
  const member = isMemberUser();
  posts.sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));

  el.innerHTML = posts.map(p => {
    const isMembersOnly = p.visibility === 'members';
    const canRead = !isMembersOnly || member;
    const activeTag = new URLSearchParams(window.location.search).get('tag');
    const tags = (p.tags ?? []).map(t =>
      `<span class="tag${t === activeTag ? ' active' : ''}" onclick="filterByTag('${esc(t)}')" title="Filter by ${esc(t)}">${esc(t)}</span>`
    ).join(' ');
    const gate = (!canRead)
      ? `<div class="members-gate-inline">🔒 Members only — <button class="btn-primary" onclick="login()">Sign in to read</button></div>`
      : '';
    const titleLink = canRead
      ? `<a href="/post.html?slug=${esc(p.slug)}">${esc(p.title || 'Untitled')}</a>`
      : esc(p.title || 'Untitled');

    return `
      <article class="post-card">
        <div class="post-card-body">
          <div class="post-meta">
            <span>${fmtDate(p.createdAt)}</span>
            ${p.author ? `<span>·</span><span>${esc(p.author)}</span>` : ''}
            ${isMembersOnly ? '<span class="badge-members">Members</span>' : ''}
            ${tags}
          </div>
          <h2>${titleLink}</h2>
          ${p.summary ? `<p class="post-summary">${esc(p.summary)}</p>` : ''}
          ${gate}
        </div>
        ${p.thumbnail ? `<img class="post-thumb" src="${esc(p.thumbnail)}" alt="" loading="lazy">` : ''}
      </article>
    `;
  }).join('');
}

// ── INIT ──────────────────────────────────────
async function init() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');

  if (code) {
    history.replaceState({}, '', window.location.pathname);
    try {
      const tokens = await exchangeCode(code);
      accessToken = tokens.access_token;
      sessionStorage.setItem('access_token', tokens.access_token);
      if (tokens.id_token) sessionStorage.setItem('id_token', tokens.id_token);
      if (tokens.refresh_token) sessionStorage.setItem('refresh_token', tokens.refresh_token);
      const returnTo = sessionStorage.getItem('return_to');
      sessionStorage.removeItem('return_to');
      if (returnTo && returnTo !== window.location.href) {
        window.location.href = returnTo;
        return;
      }
    } catch (e) {
      console.error('Login failed', e);
    }
  } else {
    accessToken = sessionStorage.getItem('access_token');
  }

  // Update header
  const btnAuth = document.getElementById('btn-auth');
  const userEmail = document.getElementById('user-email');
  if (accessToken) {
    const claims = parseJWT(accessToken);
    const idClaims = parseJWT(sessionStorage.getItem('id_token') || '');
    const groups = claims['cognito:groups'] ?? [];
    const displayName = idClaims.name || idClaims.email || 'My Profile';
    userEmail.innerHTML = `<a href="/profile.html" style="color:var(--muted);text-decoration:none;font-family:-apple-system,sans-serif;font-size:14px;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">${esc(displayName)}</a>`;
    btnAuth.textContent = 'Sign out';
    btnAuth.onclick = logout;
    if (groups.includes('editors')) {
      const editorLink = document.createElement('a');
      editorLink.href = '/editor/index.html';
      editorLink.textContent = 'Editor';
      editorLink.style.cssText = 'font-family:-apple-system,sans-serif;font-size:13px;font-weight:500;color:var(--accent);border:1px solid var(--accent);border-radius:6px;padding:6px 14px;';
      document.querySelector('.header-right').insertBefore(editorLink, btnAuth);
    }
    if (groups.includes('admins')) {
      const adminLink = document.createElement('a');
      adminLink.href = '/admin/index.html';
      adminLink.textContent = 'Admin';
      adminLink.style.cssText = 'font-family:-apple-system,sans-serif;font-size:13px;font-weight:500;color:#e07060;border:1px solid #5a2020;background:#2e1010;border-radius:6px;padding:6px 14px;';
      document.querySelector('.header-right').insertBefore(adminLink, btnAuth);
    }
  } else {
    btnAuth.textContent = 'Sign in';
    btnAuth.onclick = login;
  }

  await loadPosts();
}

init();
</script>
</body>
</html>

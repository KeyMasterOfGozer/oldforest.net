<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Old Forest</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #f7f5f0;
      --surface: #ffffff;
      --border:  #e2ddd6;
      --text:    #2c2c2c;
      --muted:   #7a7060;
      --accent:  #2d6a4f;
      --accent2: #40916c;
      --members: #6b4226;
      --radius:  8px;
    }

    body { background: var(--bg); color: var(--text); font-family: Georgia, 'Times New Roman', serif; line-height: 1.8; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Header ── */
    header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 24px; }
    .header-inner { max-width: 780px; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; height: 60px; }
    .site-title { font-size: 22px; font-weight: 700; color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 14px; font-family: -apple-system, sans-serif; font-size: 14px; }
    #user-email { color: var(--muted); }
    button { cursor: pointer; font-family: -apple-system, sans-serif; font-size: 13px; font-weight: 500; border: none; border-radius: var(--radius); padding: 7px 16px; transition: opacity .15s; }
    button:hover { opacity: .85; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-outline  { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    .btn-large   { font-size: 15px; padding: 12px 28px; }

    /* ── Article layout ── */
    main { max-width: 780px; margin: 0 auto; padding: 48px 24px; }

    .back-link { font-family: -apple-system, sans-serif; font-size: 14px; color: var(--muted); display: inline-flex; align-items: center; gap: 4px; margin-bottom: 36px; }
    .back-link:hover { color: var(--accent); text-decoration: none; }

    .post-header { margin-bottom: 36px; padding-bottom: 28px; border-bottom: 1px solid var(--border); }
    .post-header h1 { font-size: 36px; line-height: 1.25; margin-bottom: 14px; }
    .post-meta { display: flex; align-items: center; gap: 10px; font-family: -apple-system, sans-serif; font-size: 14px; color: var(--muted); flex-wrap: wrap; }
    .badge-members { background: #f5ede8; color: var(--members); border: 1px solid #e8c9b6; border-radius: 20px; padding: 3px 12px; font-size: 12px; font-weight: 600; }
    .tag { background: #edf2ee; color: var(--accent); border-radius: 20px; padding: 2px 10px; font-size: 12px; }

    /* ── Post content typography ── */
    #post-content { font-size: 17px; }
    #post-content h1, #post-content h2, #post-content h3 { margin: 1.6em 0 .6em; line-height: 1.3; color: var(--text); }
    #post-content h1 { font-size: 28px; }
    #post-content h2 { font-size: 22px; }
    #post-content h3 { font-size: 18px; }
    #post-content p  { margin-bottom: 1.2em; }
    #post-content ul, #post-content ol { margin: 0 0 1.2em 1.5em; }
    #post-content li { margin-bottom: .4em; }
    #post-content blockquote { border-left: 3px solid var(--accent); margin: 1.5em 0; padding: .5em 1.2em; color: var(--muted); font-style: italic; }
    #post-content pre { background: #f0ede6; border-radius: var(--radius); padding: 16px; overflow-x: auto; margin-bottom: 1.2em; font-size: 14px; }
    #post-content code { font-family: 'Menlo', 'Consolas', monospace; font-size: .9em; background: #f0ede6; padding: 2px 5px; border-radius: 3px; }
    #post-content pre code { background: none; padding: 0; }
    #post-content img { max-width: 100%; border-radius: var(--radius); margin: 1em 0; }
    #post-content a { color: var(--accent); }
    #post-content hr { border: none; border-top: 1px solid var(--border); margin: 2em 0; }

    /* ── Members gate ── */
    #members-gate { display: none; text-align: center; padding: 60px 32px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-top: 8px; }
    #members-gate .lock { font-size: 40px; margin-bottom: 16px; }
    #members-gate h2 { font-size: 24px; margin-bottom: 10px; }
    #members-gate p { color: var(--muted); margin-bottom: 24px; font-size: 16px; }

    /* ── Loading / error ── */
    .loading { text-align: center; padding: 80px 0; color: var(--muted); font-family: -apple-system, sans-serif; }
    .error   { text-align: center; padding: 80px 0; color: #c0392b; font-family: -apple-system, sans-serif; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a class="site-title" href="/">🌲 Old Forest</a>
    <div class="header-right">
      <span id="user-email"></span>
      <button class="btn-outline" id="btn-auth">Sign in</button>
    </div>
  </div>
</header>

<main>
  <a class="back-link" href="/">← All posts</a>
  <div id="page-content"><div class="loading">Loading…</div></div>
</main>

<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<script>
'use strict';

const CFG = {
  cognitoDomain:  'auth-165395066552.auth.us-east-1.amazoncognito.com',
  clientId:       '3ri08qut6b7db1n0j9317equ5e',
  redirectUri:    'https://oldforest.net/index.html',
  apiBase:        'https://icqes4ud42.execute-api.us-east-1.amazonaws.com',
};

let accessToken = null;

// ── PKCE ──────────────────────────────────────
function b64url(buf) {
  return btoa(String.fromCharCode(...new Uint8Array(buf)))
    .replace(/\+/g,'-').replace(/\//g,'_').replace(/=/g,'');
}
async function generatePKCE() {
  const verifier = b64url(crypto.getRandomValues(new Uint8Array(32)));
  const digest = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  return { verifier, challenge: b64url(digest) };
}

function parseJWT(token) {
  try { return JSON.parse(atob(token.split('.')[1].replace(/-/g,'+').replace(/_/g,'/'))); }
  catch { return {}; }
}

// ── AUTH ──────────────────────────────────────
async function login() {
  const { verifier, challenge } = await generatePKCE();
  sessionStorage.setItem('pkce_verifier', verifier);
  if (!sessionStorage.getItem('return_to')) {
    sessionStorage.setItem('return_to', window.location.href);
  }
  const p = new URLSearchParams({
    response_type: 'code', client_id: CFG.clientId,
    redirect_uri: CFG.redirectUri, scope: 'openid email profile aws.cognito.signin.user.admin',
    code_challenge_method: 'S256', code_challenge: challenge,
  });
  window.location.href = `https://${CFG.cognitoDomain}/oauth2/authorize?${p}`;
}

function logout() {
  accessToken = null;
  sessionStorage.clear();
  const p = new URLSearchParams({ client_id: CFG.clientId, logout_uri: CFG.redirectUri });
  window.location.href = `https://${CFG.cognitoDomain}/logout?${p}`;
}

function isMemberUser() {
  if (!accessToken) return false;
  const groups = parseJWT(accessToken)['cognito:groups'] ?? [];
  return groups.includes('members') || groups.includes('editors');
}

// ── API ───────────────────────────────────────
async function fetchPost(slug) {
  // Try members endpoint first if we have a token
  if (accessToken) {
    const res = await fetch(`${CFG.apiBase}/v1/posts/members/${slug}`, {
      headers: { Authorization: `Bearer ${accessToken}` },
    });
    if (res.ok) return res.json();
    if (res.status !== 403) throw new Error(`HTTP ${res.status}`);
  }
  // Fall back to public endpoint
  const res = await fetch(`${CFG.apiBase}/v1/posts/${slug}`);
  if (res.status === 403) return { _membersOnly: true };
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

// ── RENDER ────────────────────────────────────
function fmtDate(iso) {
  if (!iso) return '';
  return new Date(iso).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
}

function esc(s) {
  return String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function renderPost(post) {
  // Members gate
  if (post._membersOnly) {
    document.title = 'Members Only — Old Forest';
    document.getElementById('page-content').innerHTML = `
      <div id="members-gate" style="display:block">
        <div class="lock">🔒</div>
        <h2>Members Only</h2>
        <p>This post is available to members. Sign in to read it.</p>
        <button class="btn-primary btn-large" onclick="login()">Sign in</button>
      </div>
    `;
    return;
  }

  document.title = `${post.title || 'Post'} — Old Forest`;

  const tags = (post.tags ?? []).map(t => `<span class="tag">${esc(t)}</span>`).join(' ');
  const membersTag = post.visibility === 'members'
    ? '<span class="badge-members">Members</span>'
    : '';

  const html = marked.parse(post.content || '');

  document.getElementById('page-content').innerHTML = `
    <article>
      <header class="post-header">
        <h1>${esc(post.title || 'Untitled')}</h1>
        <div class="post-meta">
          ${post.author ? `<span>${esc(post.author)}</span><span>·</span>` : ''}
          <span>${fmtDate(post.createdAt)}</span>
          ${membersTag}
          ${tags}
        </div>
      </header>
      <div id="post-content">${html}</div>
    </article>
  `;
}

// ── INIT ──────────────────────────────────────
async function init() {
  accessToken = sessionStorage.getItem('access_token');

  // Update header auth state
  const btnAuth  = document.getElementById('btn-auth');
  const emailEl  = document.getElementById('user-email');
  if (accessToken) {
    const claims = parseJWT(accessToken);
    const idClaims = parseJWT(sessionStorage.getItem('id_token') || '');
    const groups = claims['cognito:groups'] ?? [];
    const displayName = idClaims.name || idClaims.email || 'My Profile';
    emailEl.innerHTML = `<a href="/profile.html" style="color:var(--muted);text-decoration:none;font-family:-apple-system,sans-serif;font-size:14px;" onmouseover="this.style.color='var(--accent)'" onmouseout="this.style.color='var(--muted)'">${displayName.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</a>`;
    btnAuth.textContent = 'Sign out';
    btnAuth.onclick = logout;
    if (groups.includes('editors')) {
      const editorLink = document.createElement('a');
      editorLink.href = '/editor/index.html';
      editorLink.textContent = 'Editor';
      editorLink.style.cssText = 'font-family:-apple-system,sans-serif;font-size:13px;font-weight:500;color:var(--accent);border:1px solid var(--accent);border-radius:6px;padding:6px 14px;';
      document.querySelector('.header-right').insertBefore(editorLink, btnAuth);
    }
  } else {
    btnAuth.textContent = 'Sign in';
    btnAuth.onclick = login;
  }

  // Get slug from URL
  const slug = new URLSearchParams(window.location.search).get('slug');
  if (!slug) {
    document.getElementById('page-content').innerHTML =
      '<div class="error">No post specified.</div>';
    return;
  }

  try {
    const post = await fetchPost(slug);
    renderPost(post);
  } catch (e) {
    document.getElementById('page-content').innerHTML =
      `<div class="error">Failed to load post: ${esc(e.message)}</div>`;
  }
}

init();
</script>
</body>
</html>

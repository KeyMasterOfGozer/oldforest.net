<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Dark forest background -->
  <rect width="32" height="32" rx="6" fill="#0d1a0b"/>

  <!-- Trunk: short, thick, gnarled brown -->
  <rect x="13.5" y="18" width="5" height="12" rx="1.5" fill="#7a4e22"/>
  <!-- Root flare -->
  <path d="M13.5 28 Q11 29.5 9 32" stroke="#7a4e22" stroke-width="2" fill="none" stroke-linecap="round"/>
  <path d="M18.5 28 Q21 29.5 23 32" stroke="#7a4e22" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Crown: overlapping circles build a wide spreading oak silhouette -->
  <!-- deep-shadow outer layers -->
  <circle cx="7"  cy="19" r="7"   fill="#163e10"/>
  <circle cx="25" cy="19" r="7"   fill="#163e10"/>
  <!-- main body -->
  <circle cx="16" cy="17" r="9.5" fill="#1a5010"/>
  <!-- mid tiers -->
  <circle cx="8"  cy="12" r="7"   fill="#246018"/>
  <circle cx="24" cy="12" r="7"   fill="#246018"/>
  <circle cx="16" cy="11" r="7.5" fill="#2d7020"/>
  <!-- upper lobes -->
  <circle cx="11" cy="5"  r="6"   fill="#357826"/>
  <circle cx="21" cy="5"  r="6"   fill="#357826"/>
  <!-- crown peak -->
  <circle cx="16" cy="3"  r="5.5" fill="#3d8a2c"/>
  <!-- sun-side highlight for depth -->
  <circle cx="20" cy="8"  r="3.5" fill="#58a83e" opacity="0.45"/>
  <!-- tiny light point at tip -->
  <circle cx="16" cy="1"  r="2"   fill="#70c050" opacity="0.35"/>
</svg>

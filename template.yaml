AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: oldforest.net serverless blog

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 10
    MemorySize: 256
    Environment:
      Variables:
        POSTS_TABLE: !Ref PostsTable
        CONTENT_BUCKET: !Ref ContentBucket

Parameters:
  DomainName:
    Type: String
    Default: oldforest.net
  AcmCertificateArn:
    Type: String
    Description: ACM certificate ARN (must be in us-east-1)

# ─────────────────────────────────────────────
#  Auth
# ─────────────────────────────────────────────
Resources:

  UserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: oldforest-users
      UsernameAttributes:
        - email
      AutoVerifiedAttributes:
        - email
      Policies:
        PasswordPolicy:
          MinimumLength: 12
          RequireUppercase: true
          RequireLowercase: true
          RequireNumbers: true
          RequireSymbols: false

  MembersGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: members
      UserPoolId: !Ref UserPool

  EditorsGroup:
    Type: AWS::Cognito::UserPoolGroup
    Properties:
      GroupName: editors
      UserPoolId: !Ref UserPool

  UserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: oldforest-web
      UserPoolId: !Ref UserPool
      GenerateSecret: false
      ExplicitAuthFlows:
        - ALLOW_USER_SRP_AUTH
        - ALLOW_REFRESH_TOKEN_AUTH
      SupportedIdentityProviders:
        - COGNITO
      CallbackURLs:
        - !Sub https://${DomainName}/editor/index.html
        - !Sub https://${DomainName}/index.html
      LogoutURLs:
        - !Sub https://${DomainName}/editor/index.html
        - !Sub https://${DomainName}/index.html
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true

  UserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub auth-${AWS::AccountId}
      UserPoolId: !Ref UserPool

# ─────────────────────────────────────────────
#  Storage
# ─────────────────────────────────────────────

  PostsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: oldforest-posts
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: postId
          AttributeType: S
        - AttributeName: slug
          AttributeType: S
      KeySchema:
        - AttributeName: postId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: slug-index
          KeySchema:
            - AttributeName: slug
              KeyType: HASH
          Projection:
            ProjectionType: ALL

  ContentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub oldforest-net-content-${AWS::AccountId}
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Sub https://${DomainName}
            AllowedMethods:
              - GET
              - PUT
            AllowedHeaders:
              - '*'
            MaxAge: 3600

  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub oldforest-net-site-${AWS::AccountId}

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${SiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

# ─────────────────────────────────────────────
#  API
# ─────────────────────────────────────────────

  HttpApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      Description: oldforest.net blog API
      CorsConfiguration:
        AllowOrigins:
          - !Sub https://${DomainName}
        AllowHeaders:
          - Authorization
          - Content-Type
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS
      Auth:
        Authorizers:
          CognitoAuthorizer:
            IdentitySource: $request.header.Authorization
            JwtConfiguration:
              issuer: !Sub https://cognito-idp.${AWS::Region}.amazonaws.com/${UserPool}
              audience:
                - !Ref UserPoolClient

# ─────────────────────────────────────────────
#  Lambda Functions
# ─────────────────────────────────────────────

  ListPostsFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/list-posts/
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PostsTable
      Events:
        PublicList:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/posts
            Method: GET
        EditorList:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/editor/posts
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  GetPostFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/get-post/
      Handler: index.handler
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PostsTable
        - S3ReadPolicy:
            BucketName: !Ref ContentBucket
      Events:
        PublicGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/posts/{slug}
            Method: GET
        MembersGet:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/posts/members/{slug}
            Method: GET
            Auth:
              Authorizer: CognitoAuthorizer

  CreatePostFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/create-post/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PostsTable
        - S3CrudPolicy:
            BucketName: !Ref ContentBucket
      Events:
        Create:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/editor/posts
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer

  UpdatePostFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/update-post/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PostsTable
        - S3CrudPolicy:
            BucketName: !Ref ContentBucket
      Events:
        Update:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/editor/posts/{postId}
            Method: PUT
            Auth:
              Authorizer: CognitoAuthorizer

  DeletePostFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/delete-post/
      Handler: index.handler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PostsTable
        - S3CrudPolicy:
            BucketName: !Ref ContentBucket
      Events:
        Delete:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/editor/posts/{postId}
            Method: DELETE
            Auth:
              Authorizer: CognitoAuthorizer

  UploadUrlFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: src/functions/upload-url/
      Handler: index.handler
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ContentBucket
      Events:
        Upload:
          Type: HttpApi
          Properties:
            ApiId: !Ref HttpApi
            Path: /v1/editor/upload
            Method: POST
            Auth:
              Authorizer: CognitoAuthorizer

# ─────────────────────────────────────────────
#  CloudFront
# ─────────────────────────────────────────────

  ContentBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ContentBucket
      PolicyDocument:
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${ContentBucket.Arn}/images/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}

  WwwRedirectFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: oldforest-www-redirect
      AutoPublish: true
      FunctionConfig:
        Comment: Redirect www.oldforest.net to oldforest.net
        Runtime: cloudfront-js-2.0
      FunctionCode: |
        function handler(event) {
          var host = event.request.headers.host.value;
          if (host.startsWith('www.')) {
            return {
              statusCode: 301,
              statusDescription: 'Moved Permanently',
              headers: {
                location: { value: 'https://' + host.slice(4) + event.request.uri }
              }
            };
          }
          return event.request;
        }

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: oldforest-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  ContentOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: oldforest-content-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Aliases:
          - !Ref DomainName
          - !Sub www.${DomainName}
        ViewerCertificate:
          AcmCertificateArn: !Ref AcmCertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021
        DefaultRootObject: index.html
        Origins:
          - Id: SiteS3Origin
            DomainName: !GetAtt SiteBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: ContentS3Origin
            DomainName: !GetAtt ContentBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt ContentOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
          - Id: ApiOrigin
            DomainName: !Sub ${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
            CustomOriginConfig:
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
        CacheBehaviors:
          - PathPattern: /images/*
            TargetOriginId: ContentS3Origin
            ViewerProtocolPolicy: redirect-to-https
            CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized
            AllowedMethods:
              - GET
              - HEAD
          - PathPattern: /v1/*
            TargetOriginId: ApiOrigin
            ViewerProtocolPolicy: https-only
            CachePolicyId: 4135ea2d-6df8-44a3-9df3-4b5a84be39ad  # CachingDisabled managed policy
            OriginRequestPolicyId: b689b0a8-53d0-40ab-baf2-68738e2966ac  # AllViewerExceptHostHeader
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
        DefaultCacheBehavior:
          TargetOriginId: SiteS3Origin
          ViewerProtocolPolicy: redirect-to-https
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6  # CachingOptimized managed policy
          AllowedMethods:
            - GET
            - HEAD
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt WwwRedirectFunction.FunctionARN
        CustomErrorResponses:
          - ErrorCode: 403
            ResponseCode: 200
            ResponsePagePath: /index.html
          - ErrorCode: 404
            ResponseCode: 200
            ResponsePagePath: /index.html

# ─────────────────────────────────────────────
#  Outputs
# ─────────────────────────────────────────────

Outputs:
  ApiUrl:
    Value: !Sub https://${HttpApi}.execute-api.${AWS::Region}.amazonaws.com
  UserPoolId:
    Value: !Ref UserPool
  UserPoolClientId:
    Value: !Ref UserPoolClient
  CloudFrontDomain:
    Value: !GetAtt CloudFrontDistribution.DomainName
  SiteBucketName:
    Value: !Ref SiteBucket
  ContentBucketName:
    Value: !Ref ContentBucket
